<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Demo Video - 图腾奇迹 - Totem Wonders</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    .video-wrap {
      width: 80vw;
      height: 80vh;
      max-width: 1200px;
      max-height: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 0.5rem;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      border-radius: 6px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    }

    @media (max-aspect-ratio: 3/2) {
      .video-wrap { width: 90vw; height: 70vh; }
    }
    @media (max-width: 420px) {
      .video-wrap { width: 96vw; height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video controls playsinline>
      <source src="https://raw.githubusercontent.com/gcodeer/PGSoft/main/video/game_1338274.mp4" type="video/mp4">
      您的浏览器不支持 video 标签。
    </video>
  </div>
</body>
</html>
